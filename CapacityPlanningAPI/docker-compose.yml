services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: capacity
      POSTGRES_USER: capacity
      POSTGRES_PASSWORD: capacity
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capacity -d capacity"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    environment: &app-environment
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://capacity:capacity@postgres:5432/capacity
      AUTH_MODE: local
      LOCAL_JWT_SECRET: development-only-secret-change-me
      JIRA_WEBHOOK_SECRET: development-jira-secret
      PAYSPACE_WEBHOOK_SECRET: development-payspace-secret
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: ["celery", "-A", "app.workers.celery_app:celery_app", "worker", "--loglevel=INFO"]
    environment: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build: .
    command: ["celery", "-A", "app.workers.celery_app:celery_app", "beat", "--loglevel=INFO"]
    environment: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:

